{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 40px; margin-bottom: 80px;">
    <div class="card">
        <div class="card-body" style="padding: 30px;">
            <h3 class="text-center mb-4">Create Quiz</h3>
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% for error in field.errors %}
                    <div style="color: #ff6b6b; font-size: 14px;">{{ error }}</div>
                    {% endfor %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100 mt-2">Create & Add Questions</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
