{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 40px; margin-bottom: 80px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>{{ quiz.title }}</h4>
        <a href="{% url 'quiz:profile' %}" class="btn btn-success btn-sm">Finish</a>
    </div>

    {% for q in quiz.questions.all %}
    <div class="card mb-2">
        <div class="card-body py-2 d-flex justify-content-between align-items-center">
            <span>{{ forloop.counter }}. {{ q.text }}</span>
            <span class="badge bg-info">{{ q.get_question_type_display }}</span>
        </div>
    </div>
    {% endfor %}

    <div class="card mt-3">
        <div class="card-body" style="padding: 25px;">
            <h5 class="mb-3">Add Question</h5>
            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary w-100">Next: Add Choices</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
