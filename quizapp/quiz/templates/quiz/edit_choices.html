{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 600px; margin-top: 40px; margin-bottom: 80px;">
    <div class="card">
        <div class="card-body" style="padding: 25px;">
            <h5 class="mb-1">{{ question.text }}</h5>
            <small class="text-muted">{{ question.get_question_type_display }}</small>

            {% if question.question_type == 'truefalse' %}
            <form method="POST" class="mt-3">
                {% csrf_token %}
                <div class="form-check mb-2">
                    <input class="form-check-input" type="radio" name="correct" value="True" id="true" required>
                    <label class="form-check-label" for="true">True</label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="radio" name="correct" value="False" id="false">
                    <label class="form-check-label" for="false">False</label>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save & Add Next Question</button>
            </form>

            {% elif question.question_type == 'fillblank' %}
            <form method="POST" class="mt-3">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Correct Answer</label>
                    <input type="text" name="answer" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save & Add Next Question</button>
            </form>

            {% else %}
            <form method="POST" class="mt-3">
                {% csrf_token %}
                <div class="mb-2">
                    <label class="form-label">Choice A</label>
                    <div class="input-group">
                        <div class="input-group-text">
                            <input type="radio" name="correct" value="0" required>
                        </div>
                        <input type="text" name="choice_text" class="form-control" placeholder="Option A" required>
                    </div>
                </div>
                <div class="mb-2">
                    <label class="form-label">Choice B</label>
                    <div class="input-group">
                        <div class="input-group-text">
                            <input type="radio" name="correct" value="1">
                        </div>
                        <input type="text" name="choice_text" class="form-control" placeholder="Option B" required>
                    </div>
                </div>
                <div class="mb-2">
                    <label class="form-label">Choice C</label>
                    <div class="input-group">
                        <div class="input-group-text">
                            <input type="radio" name="correct" value="2">
                        </div>
                        <input type="text" name="choice_text" class="form-control" placeholder="Option C">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Choice D</label>
                    <div class="input-group">
                        <div class="input-group-text">
                            <input type="radio" name="correct" value="3">
                        </div>
                        <input type="text" name="choice_text" class="form-control" placeholder="Option D">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">Save & Add Next Question</button>
            </form>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
